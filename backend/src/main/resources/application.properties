spring.application.name=car-dealership
spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/incubyte}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:myDefaultSecretKeyThatShouldBeChangedInProductionPleaseMakeItLongEnough2024}
jwt.expiration=${JWT_EXPIRATION:86400000}
