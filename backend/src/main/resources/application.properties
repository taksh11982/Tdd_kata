spring.application.name=car-dealership
spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/car_dealership}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:myDefaultSecretKeyThatShouldBeChangedInProductionPleaseMakeItLongEnough2024}
jwt.expiration=${JWT_EXPIRATION:86400000}
